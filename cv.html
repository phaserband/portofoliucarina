<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#F7F7F5">
  <title>CV · Carina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#F7F7F5;--white:#FFFFFF;--card:#FFFFFF;--card2:#F0EFEC;
      --dark:#111110;--text:#111110;--soft:#666662;--muted:#AAAA9F;
      --accent:#C85C2A;--accent-bg:#FDF1EB;--border:#E4E4DF;
      --radius:16px;--shadow:0 2px 18px rgba(0,0,0,.06);
      --focus:0 0 0 4px rgba(200,92,42,.18);
    }
    html{height:100%;height:100dvh;overflow:hidden;}
    body{
      font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);
      line-height:1.55;-webkit-font-smoothing:antialiased;
      height:100%;
      max-height:100vh;
      max-height:100dvh;
      min-height:0;
      display:flex;flex-direction:column;
      overflow:hidden;
      -webkit-text-size-adjust:100%;
    }
    a{color:inherit;}
    .nav{
      position:sticky;top:0;z-index:50;flex:0 0 auto;
      padding:10px 48px;min-height:56px;
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
      background:var(--bg);border-bottom:1px solid var(--border);
    }
    @media(max-width:600px){.nav{padding:10px 16px;min-height:52px;}}
    .nav-logo{
      font-size:15px;font-weight:700;letter-spacing:-.01em;
      min-width:0;flex:1 1 auto;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    @media(max-width:380px){.nav-logo{font-size:14px;}}
    .nav-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}
    .nb{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:44px;padding:0 16px;border-radius:12px;
      font-size:13px;font-family:inherit;font-weight:600;color:var(--soft);
      cursor:pointer;text-decoration:none;transition:all .15s;
      background:transparent;border:1px solid var(--border);
      -webkit-tap-highlight-color:transparent;
    }
    .nb:active{border-color:rgba(200,92,42,.45);color:var(--text);background:var(--accent-bg);}
    .nb:hover{border-color:rgba(200,92,42,.35);color:var(--text);background:var(--accent-bg);}
    .nb:focus-visible{outline:none;box-shadow:var(--focus);border-color:transparent;}

    #pdfScroll{
      flex:1 1 0;
      min-height:0;
      overflow-x:hidden;overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      touch-action:pan-y;
      overscroll-behavior-y:contain;
    }
    #pdfStatus{
      text-align:center;font-size:13px;font-weight:600;color:var(--soft);
      padding:18px 16px 8px;
    }
    #pdfStatus.err{color:#b03a2e;}
    #pdfPages{
      max-width:920px;margin:0 auto;
      padding:4px 16px max(20px, env(safe-area-inset-bottom, 0px));
      display:flex;flex-direction:column;align-items:center;gap:14px;
    }
    #pdfPages canvas{
      display:block;max-width:100%;
      border-radius:12px;background:#fff;
      box-shadow:var(--shadow);
    }
    #pdfFallback{
      display:none;width:100%;flex:1 1 auto;min-height:0;border:0;background:var(--card2);
    }
    #pdfFallback.show{display:block;}

    @supports(padding:max(0px)){
      .nav{
        padding-left:max(16px, env(safe-area-inset-left));
        padding-right:max(16px, env(safe-area-inset-right));
        padding-top:max(10px, env(safe-area-inset-top));
      }
    }

    @media print{
      .nav{display:none !important;}
      html{height:auto !important;max-height:none !important;overflow:visible !important;}
      body{overflow:visible !important;display:block !important;height:auto !important;max-height:none !important;min-height:auto !important;}
      #pdfScroll{flex:none !important;overflow:visible !important;}
      #pdfStatus{display:none !important;}
      #pdfPages{padding:0;gap:0;max-width:none;}
      #pdfPages canvas{box-shadow:none;border-radius:0;page-break-after:always;}
    }
  </style>
</head>
<body>
  <nav class="nav">
    <span class="nav-logo">Carina Dumitru</span>
    <div class="nav-right">
      <a class="nb" href="index.html#work">Înapoi</a>
    </div>
  </nav>

  <main id="pdfScroll">
    <div id="pdfStatus">Se încarcă CV-ul…</div>
    <div id="pdfPages" aria-busy="true"></div>
    <iframe id="pdfFallback" class="frame" title="CV PDF" src="CV.pdf#toolbar=0&amp;navpanes=0"></iframe>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
(function(){
  const PDF_URL="CV.pdf";
  const WORKER="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const statusEl=document.getElementById("pdfStatus");
  const pagesEl=document.getElementById("pdfPages");
  const fallback=document.getElementById("pdfFallback");
  const scrollEl=document.getElementById("pdfScroll");

  let renderGen=0;
  function showFallback(msg){
    if(msg){statusEl.textContent=msg;statusEl.classList.add("err");}
    else{statusEl.style.display="none";}
    pagesEl.innerHTML="";
    pagesEl.removeAttribute("aria-busy");
    fallback.classList.add("show");
    fallback.style.minHeight="calc(100dvh - 120px)";
    fallback.style.minHeight="calc(100vh - 120px)";
  }

  async function render(){
    const gen=++renderGen;
    if(typeof pdfjsLib==="undefined"){
      showFallback("Nu s-a putut încărca vizualizatorul. Se folosește vizualizarea standard.");
      return;
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc=WORKER;
    statusEl.style.display="";
    statusEl.classList.remove("err");
    statusEl.textContent="Se încarcă CV-ul…";
    pagesEl.innerHTML="";
    pagesEl.setAttribute("aria-busy","true");
    fallback.classList.remove("show");

    const cw=Math.max(240, scrollEl.clientWidth-32);
    let pdf;
    try{
      pdf=await pdfjsLib.getDocument({url:PDF_URL, withCredentials:false}).promise;
    }catch(e){
      if(gen!==renderGen)return;
      showFallback("Deschide CV-ul în vizualizarea standard.");
      return;
    }
    if(gen!==renderGen)return;

    const dpr=Math.min(window.devicePixelRatio||1,2);
    const frag=document.createDocumentFragment();

    try{
      for(let i=1;i<=pdf.numPages;i++){
        if(gen!==renderGen)return;
        const page=await pdf.getPage(i);
        const base=page.getViewport({scale:1});
        const scale=cw/base.width;
        const viewport=page.getViewport({scale});

        const canvas=document.createElement("canvas");
        const ctx=canvas.getContext("2d",{alpha:false});
        canvas.width=Math.floor(viewport.width*dpr);
        canvas.height=Math.floor(viewport.height*dpr);
        canvas.style.width=Math.floor(viewport.width)+"px";
        canvas.style.height=Math.floor(viewport.height)+"px";
        ctx.setTransform(dpr,0,0,dpr,0,0);

        await page.render({canvasContext:ctx, viewport}).promise;
        frag.appendChild(canvas);
      }
    }catch(err){
      if(gen!==renderGen)return;
      showFallback("Deschide CV-ul în vizualizarea standard.");
      return;
    }

    if(gen!==renderGen)return;
    pagesEl.appendChild(frag);
    statusEl.style.display="none";
    pagesEl.removeAttribute("aria-busy");
  }

  let t;
  function schedule(){clearTimeout(t);t=setTimeout(render,180);}

  window.addEventListener("resize",schedule,{passive:true});
  window.addEventListener("orientationchange",schedule,{passive:true});
  render();
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(schedule).catch(function(){});}
})();
  </script>
  <noscript>
    <style>#pdfStatus,#pdfPages{display:none!important;}#pdfFallback{display:block!important;min-height:80vh;}</style>
  </noscript>
</body>
</html>
