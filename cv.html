<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F7F5">
  <title>CV · Carina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#F7F7F5;--white:#FFFFFF;--card:#FFFFFF;--card2:#F0EFEC;
      --dark:#111110;--text:#111110;--soft:#666662;--muted:#AAAA9F;
      --accent:#C85C2A;--accent-bg:#FDF1EB;--border:#E4E4DF;
      --radius:16px;--shadow:0 2px 18px rgba(0,0,0,.06);
      --focus:0 0 0 4px rgba(200,92,42,.18);
    }
    [data-theme="dark"]{
      --bg:#111110;--white:#1C1C1A;--card:#1C1C1A;--card2:#242422;
      --dark:#F5F5F2;--text:#F5F5F2;--soft:#999992;--muted:#555550;
      --accent:#E07040;--accent-bg:#2A1A10;--border:#2A2A28;
      --shadow:0 2px 18px rgba(0,0,0,.3);
      --focus:0 0 0 4px rgba(224,112,64,.22);
    }
    html{height:100%;}
    body{
      font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);
      line-height:1.55;-webkit-font-smoothing:antialiased;
      min-height:100vh;min-height:100dvh;
      display:flex;flex-direction:column;
      overflow:hidden;
      -webkit-text-size-adjust:100%;
    }
    a{color:inherit;}
    .nav{
      position:sticky;top:0;z-index:50;flex:0 0 auto;
      padding:10px 48px;min-height:56px;
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
      background:var(--bg);border-bottom:1px solid var(--border);
    }
    @media(max-width:600px){
      .nav{padding:10px 16px;min-height:52px;}
    }
    .nav-logo{
      font-size:15px;font-weight:700;letter-spacing:-.01em;
      min-width:0;flex:1 1 auto;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    @media(max-width:380px){.nav-logo{font-size:14px;}}
    .nav-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}
    .nb{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:44px;padding:0 16px;border-radius:12px;
      font-size:13px;font-family:inherit;font-weight:600;color:var(--soft);
      cursor:pointer;text-decoration:none;transition:all .15s;
      background:transparent;border:1px solid var(--border);
      -webkit-tap-highlight-color:transparent;
    }
    .nb:active{border-color:rgba(200,92,42,.45);color:var(--text);background:var(--accent-bg);}
    .nb:hover{border-color:rgba(200,92,42,.35);color:var(--text);background:var(--accent-bg);}
    .nb:focus-visible{outline:none;box-shadow:var(--focus);border-color:transparent;}

    main{
      flex:1 1 auto;min-height:0;
      display:flex;flex-direction:column;
    }
    .frame{
      flex:1 1 auto;min-height:0;width:100%;border:0;display:block;background:var(--card2);
      -webkit-overflow-scrolling:touch;
    }

    @supports(padding:max(0px)){
      .nav{
        padding-left:max(16px, env(safe-area-inset-left));
        padding-right:max(16px, env(safe-area-inset-right));
        padding-top:max(10px, env(safe-area-inset-top));
      }
    }

    @media print{
      .nav{display:none !important;}
      body{background:#fff !important;color:#111 !important;overflow:visible !important;display:block !important;min-height:auto !important;}
      main{display:block !important;min-height:auto !important;}
      .frame{min-height:100vh !important;}
    }
  </style>
</head>
<body>
  <nav class="nav">
    <span class="nav-logo">Carina Dumitru</span>
    <div class="nav-right">
      <a class="nb" href="index.html#work">Înapoi</a>
    </div>
  </nav>

  <main>
    <iframe class="frame" src="CV.pdf#toolbar=0&amp;navpanes=0&amp;scrollbar=0&amp;view=FitH" title="CV PDF"></iframe>
  </main>
</body>
</html>
