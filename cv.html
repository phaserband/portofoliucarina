<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV · Carina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#F7F7F5;--white:#FFFFFF;--card:#FFFFFF;--card2:#F0EFEC;
      --dark:#111110;--text:#111110;--soft:#666662;--muted:#AAAA9F;
      --accent:#C85C2A;--accent-bg:#FDF1EB;--border:#E4E4DF;
      --radius:16px;--shadow:0 2px 18px rgba(0,0,0,.06);
      --focus:0 0 0 4px rgba(200,92,42,.18);
    }
    [data-theme="dark"]{
      --bg:#111110;--white:#1C1C1A;--card:#1C1C1A;--card2:#242422;
      --dark:#F5F5F2;--text:#F5F5F2;--soft:#999992;--muted:#555550;
      --accent:#E07040;--accent-bg:#2A1A10;--border:#2A2A28;
      --shadow:0 2px 18px rgba(0,0,0,.3);
      --focus:0 0 0 4px rgba(224,112,64,.22);
    }
    body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased;}
    a{color:inherit;}
    .nav{position:sticky;top:0;z-index:50;padding:0 48px;height:56px;display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-bottom:1px solid var(--border);}
    @media(max-width:600px){.nav{padding:0 18px;height:60px;}}
    .nav-logo{font-size:15px;font-weight:700;letter-spacing:-.01em;}
    .nav-right{display:flex;gap:8px;align-items:center;}
    .nb{background:transparent;border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12.5px;font-family:inherit;font-weight:600;color:var(--soft);cursor:pointer;text-decoration:none;transition:all .15s;}
    .nb:hover{border-color:rgba(200,92,42,.35);color:var(--text);background:var(--accent-bg);}
    .nb:focus-visible{outline:none;box-shadow:var(--focus);border-color:transparent;}

    main{height:calc(100vh - 56px);}
    @media(max-width:600px){main{height:calc(100vh - 60px);}}
    .frame{width:100%;height:100%;border:0;display:block;background:var(--card2);}
    @media print{.nav{display:none !important;} body{background:#fff !important;color:#111 !important;} main{height:auto !important;}}
  </style>
</head>
<body>
  <nav class="nav">
    <span class="nav-logo">Carina Dumitru</span>
    <div class="nav-right">
      <a class="nb" href="index.html#work">Înapoi</a>
    </div>
  </nav>

  <main>
    <iframe class="frame" src="CV.pdf#toolbar=0&amp;navpanes=0&amp;scrollbar=0&amp;view=FitH" title="CV PDF"></iframe>
  </main>
</body>
</html>
